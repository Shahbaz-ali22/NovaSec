# NovaSec Bug Bounty Profile
# ============================================================
# Safe configuration tuned for bug bounty programs.
# Respects program rules: no DoS, no destructive tests,
# respects rate limits to avoid account bans.
#
# Usage: novasec scan <cmd> --profile bugbounty --target <target>
# ============================================================

network:
  rate_limit: 5
  timeout: 30
  retries: 2
  verify_ssl: true

scan:
  aggressive: false
  stealth_mode: false
  scan_timeout: 300

exploit:
  enabled: false          # Never enable exploits in bug bounty
  safe_mode: true
  require_confirmation: true

general:
  max_threads: 5
  max_concurrent_tasks: 15
